version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 14
      semver-major-days: 28
    versioning-strategy: increase
  - package-ecosystem: 'github-actions'
    directory: '/'
    groups:
      codeql:
        patterns:
          - 'github/codeql-action'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 14
